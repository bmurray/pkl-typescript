name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: "0.31.0"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install TypeScript and Zod
        run: bun add -d typescript zod

      - name: Verify package builds
        run: pkl project package . --output-path out/

      - name: Generate TypeScript from test fixtures
        run: |
          pkl run gen.pkl --project-dir . -- \
            tests/fixtures/AppConfig.pkl \
            tests/fixtures/common/Types.pkl \
            tests/fixtures/common/Auth.pkl \
            tests/fixtures/ServiceConfig.pkl \
            --output-path test-output

      - name: Generate Zod schemas from test fixtures
        run: |
          pkl run zod/gen.pkl --project-dir . -- \
            tests/fixtures/AppConfig.pkl \
            tests/fixtures/common/Types.pkl \
            tests/fixtures/common/Auth.pkl \
            tests/fixtures/ServiceConfig.pkl \
            --output-path test-output

      - name: Verify generated code compiles
        run: bunx tsc --noEmit --strict --target es2020 --moduleResolution bundler --ignoreConfig test-output/*.ts

      - name: Show generated output
        run: |
          for f in test-output/*.ts; do
            echo "=== $(basename $f) ==="
            cat "$f"
            echo ""
          done
