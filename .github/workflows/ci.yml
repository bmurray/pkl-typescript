name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pkl
        uses: pkl-community/setup-pkl@v0
        with:
          pkl-version: "0.31.0"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install TypeScript and Zod
        run: bun add -d typescript zod

      - name: Verify package builds
        run: pkl project package . --output-path out/

      - name: Run integration tests (70 tests)
        run: bun tests/run-tests.ts --generate

      - name: Run data-driven JSON tests (110 tests)
        run: bun tests/run-data-tests.ts

      - name: Run Pkl round-trip tests (30 tests)
        run: bun tests/run-pkl-data-tests.ts

      - name: Show generated output
        if: always()
        run: find test-output -name '*.ts' | sort | while read f; do echo "=== $f ==="; cat "$f"; echo; done
